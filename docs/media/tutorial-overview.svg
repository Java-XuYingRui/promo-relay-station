<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="680" fill="#F7F9FC"/>
  <rect x="60" y="52" width="1080" height="576" rx="28" fill="#FFFFFF" stroke="#D9E1EC"/>
  <text x="110" y="125" fill="#162033" font-family="Arial, Microsoft YaHei, sans-serif" font-size="42" font-weight="700">宣传中转站完整工作流</text>
  <text x="112" y="170" fill="#526071" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22">从一个 work.json 开始，生成多平台文案和素材，再到官方页面发布和复盘。</text>

  <defs>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="11" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L12 8L2 14" stroke="#7A8AA0" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <g font-family="Arial, Microsoft YaHei, sans-serif">
    <rect x="104" y="252" width="176" height="156" rx="18" fill="#EAF5FF" stroke="#8CC8F7"/>
    <text x="192" y="305" text-anchor="middle" fill="#0B4F7A" font-size="26" font-weight="700">1 配置项目</text>
    <text x="192" y="347" text-anchor="middle" fill="#315B78" font-size="18">填写标题、入口</text>
    <text x="192" y="376" text-anchor="middle" fill="#315B78" font-size="18">标签、素材路径</text>

    <line x1="296" y1="330" x2="384" y2="330" stroke="#7A8AA0" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="400" y="252" width="176" height="156" rx="18" fill="#FFF3E4" stroke="#F6BE77"/>
    <text x="488" y="305" text-anchor="middle" fill="#8A4D00" font-size="26" font-weight="700">2 生成草稿</text>
    <text x="488" y="347" text-anchor="middle" fill="#705330" font-size="18">一键输出小红书</text>
    <text x="488" y="376" text-anchor="middle" fill="#705330" font-size="18">抖音、B站等文案</text>

    <line x1="592" y1="330" x2="680" y2="330" stroke="#7A8AA0" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="696" y="252" width="176" height="156" rx="18" fill="#EAF8EF" stroke="#91D9A7"/>
    <text x="784" y="305" text-anchor="middle" fill="#166B35" font-size="26" font-weight="700">3 生成海报</text>
    <text x="784" y="347" text-anchor="middle" fill="#3E6848" font-size="18">输出 SVG 素材</text>
    <text x="784" y="376" text-anchor="middle" fill="#3E6848" font-size="18">按平台转 PNG/JPG</text>

    <line x1="888" y1="330" x2="976" y2="330" stroke="#7A8AA0" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="992" y="252" width="176" height="156" rx="18" fill="#F0EDFF" stroke="#B8A7F4"/>
    <text x="1080" y="305" text-anchor="middle" fill="#4B35A0" font-size="26" font-weight="700">4 发布复盘</text>
    <text x="1080" y="347" text-anchor="middle" fill="#61558D" font-size="18">官方后台发布</text>
    <text x="1080" y="376" text-anchor="middle" fill="#61558D" font-size="18">记录链接和效果</text>

    <rect x="128" y="486" width="944" height="72" rx="16" fill="#162033"/>
    <text x="600" y="531" text-anchor="middle" fill="#FFFFFF" font-size="24" font-weight="700">核心原则：工具负责准备，账号登录、审核、验证码和最终发布由账号本人确认。</text>
  </g>
</svg>
